# ============================================================
# NavSat Transform: GPS → local map frame
# ============================================================
navsat_transform_node:
  ros__parameters:
    frequency: 30.0
    delay: 3.0
    magnetic_declination_radians: 0.1257  # 7.2° East for Disley, SK
    yaw_offset: 0.0
    zero_altitude: true
    publish_filtered_gps: true
    broadcast_utm_transform: true
    broadcast_utm_transform_as_parent_frame: false
    wait_for_datum: true
    use_odometry_yaw: false     # use magnetometer heading from FarmTRX (via /gps/imu)
    use_local_cartesian: true    # better accuracy near datum point
    # Datum: CDS2 airstrip center
    datum: [50.63447, -105.03184, 0.0]
