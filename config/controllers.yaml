controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_base_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_base_controller:
  ros__parameters:
    publish_rate: 50.0

    enable_odom_tf: false

    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']
    wheel_separation: 1.321  # meters (measured: 52" center-to-center, Mar 2026)
    wheel_radius: 0.184    # meters (measured: 14 1/2" diameter, Mar 2026)
    wheels_per_side: 1

    use_stamped_vel: true
    cmd_vel_timeout: 999.0  # effectively disable staleness check — Gazebo clock drift causes stale timestamps

    # Open loop — no wheel encoders, GPS provides odometry
    open_loop: true
