version: '2.3'
services:
  xserver:
    image: devrt/xserver
    ipc: host
    security_opt:
    - seccomp:unconfined
    ports:
    - "12345:80"
    healthcheck:
      test: ["CMD-SHELL", "test -e /tmp/.X11-unix/X0"]
      interval: "1s"
      retries: 20
  workspace:
    build: .
    ipc: host
    network_mode: host
    privileged: true
    security_opt:
    - seccomp:unconfined
    volumes:
    - /dev:/dev
    - build:/home/ws/build
    - install:/home/ws/install
    - log:/home/ws/log
    environment:
    - DISPLAY=:0
    - ROS_LOCALHOST_ONLY=1
    - ROS_DOMAIN_ID=0
    volumes_from:
    - xserver
    depends_on:
    - xserver
volumes:
  build:
  install:
  log:
