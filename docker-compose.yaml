services:
  xserver:
    image: devrt/xserver
    ipc: host
    security_opt:
      - seccomp:unconfined
    ports:
      - "12345:80"
    healthcheck:
      test: ["CMD-SHELL", "test -e /tmp/.X11-unix/X0"]
      interval: "1s"
      retries: 20

  sim:
    build: .
    ipc: host
    security_opt:
      - seccomp:unconfined
    volumes:
      - build:/opt/ws/build
      - install:/opt/ws/install
      - log:/opt/ws/log
    environment:
      - DISPLAY=:0
      - ROS_DOMAIN_ID=0
    volumes_from:
      - xserver
    depends_on:
      xserver:
        condition: service_healthy
    command: ros2 launch moxl sim.launch.py

  # Run the full stack (no Gazebo, for Pi or headless)
  moxl:
    build: .
    ipc: host
    security_opt:
      - seccomp:unconfined
    volumes:
      - /dev:/dev
    environment:
      - ROS_DOMAIN_ID=0
    privileged: true
    command: ros2 launch moxl moxl.launch.py
    profiles:
      - robot

  # Foxglove bridge — connect at ws://localhost:8765
  foxglove:
    build: .
    ipc: host
    security_opt:
      - seccomp:unconfined
    ports:
      - "8765:8765"
    environment:
      - ROS_DOMAIN_ID=0
    volumes_from:
      - xserver
    depends_on:
      xserver:
        condition: service_healthy
    command: ros2 launch foxglove_bridge foxglove_bridge_launch.xml
    profiles:
      - foxglove

volumes:
  build:
  install:
  log:
