<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550" font-family="monospace" font-size="13">
  <rect width="800" height="550" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold">MOXL Measurement Sheet 2/4 — Chassis Top View</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#666">Print at 100%. Write measurements in the boxes. FRONT = top of page.</text>

  <!-- Chassis outline -->
  <rect x="200" y="100" width="400" height="350" rx="15" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-size="12" fill="#666">FRONT</text>
  <text x="400" y="470" text-anchor="middle" font-size="12" fill="#666">REAR (engine)</text>

  <!-- Drive wheels (rear) -->
  <rect x="170" y="370" width="40" height="70" rx="8" fill="#ddd" stroke="black" stroke-width="2"/>
  <text x="190" y="410" text-anchor="middle" font-size="10">L</text>
  <rect x="590" y="370" width="40" height="70" rx="8" fill="#ddd" stroke="black" stroke-width="2"/>
  <text x="610" y="410" text-anchor="middle" font-size="10">R</text>

  <!-- Drive axle line -->
  <line x1="210" y1="405" x2="590" y2="405" stroke="black" stroke-width="1" stroke-dasharray="5,5"/>
  <circle cx="400" cy="405" r="4" fill="black"/>
  <text x="408" y="400" font-size="10">axle center</text>

  <!-- Caster wheels (front) -->
  <ellipse cx="280" cy="140" rx="12" ry="20" fill="#ddd" stroke="black" stroke-width="1.5"/>
  <ellipse cx="520" cy="140" rx="12" ry="20" fill="#ddd" stroke="black" stroke-width="1.5"/>

  <!-- GPS antenna -->
  <circle cx="400" cy="250" r="12" fill="none" stroke="black" stroke-width="2"/>
  <line x1="400" y1="238" x2="400" y2="262" stroke="black" stroke-width="1"/>
  <line x1="388" y1="250" x2="412" y2="250" stroke="black" stroke-width="1"/>
  <text x="418" y="254" font-size="10">GPS antenna</text>

  <!-- ========== DIMENSION A: Wheel separation (center to center) ========== -->
  <line x1="190" y1="480" x2="610" y2="480" stroke="red" stroke-width="1.5"/>
  <line x1="190" y1="440" x2="190" y2="490" stroke="red" stroke-width="1"/>
  <line x1="610" y1="440" x2="610" y2="490" stroke="red" stroke-width="1"/>
  <text x="390" y="500" fill="red" font-size="12" font-weight="bold">A</text>
  <rect x="355" y="503" width="100" height="22" fill="white" stroke="red" stroke-width="1"/>
  <text x="360" y="519" fill="#ccc" font-size="11">________ "</text>
  <text x="355" y="540" fill="red" font-size="10">(verify 51 3/4")</text>

  <!-- ========== DIMENSION B: Chassis width ========== -->
  <line x1="200" y1="75" x2="600" y2="75" stroke="blue" stroke-width="1.5"/>
  <line x1="200" y1="68" x2="200" y2="100" stroke="blue" stroke-width="1"/>
  <line x1="600" y1="68" x2="600" y2="100" stroke="blue" stroke-width="1"/>
  <text x="390" y="72" fill="blue" font-size="12" font-weight="bold">B</text>
  <rect x="420" y="58" width="100" height="22" fill="white" stroke="blue" stroke-width="1"/>
  <text x="425" y="74" fill="#ccc" font-size="11">________ "</text>

  <!-- ========== DIMENSION C: Chassis length ========== -->
  <line x1="150" y1="100" x2="150" y2="450" stroke="green" stroke-width="1.5"/>
  <line x1="143" y1="100" x2="200" y2="100" stroke="green" stroke-width="1"/>
  <line x1="143" y1="450" x2="200" y2="450" stroke="green" stroke-width="1"/>
  <text x="130" y="280" fill="green" font-size="12" font-weight="bold">C</text>
  <rect x="90" y="283" width="70" height="22" fill="white" stroke="green" stroke-width="1"/>
  <text x="95" y="299" fill="#ccc" font-size="11">_____ "</text>

  <!-- ========== DIMENSION D: Axle to front ========== -->
  <line x1="660" y1="100" x2="660" y2="405" stroke="purple" stroke-width="1.5"/>
  <line x1="600" y1="100" x2="667" y2="100" stroke="purple" stroke-width="1"/>
  <line x1="653" y1="405" x2="667" y2="405" stroke="purple" stroke-width="1"/>
  <text x="670" y="260" fill="purple" font-size="12" font-weight="bold">D</text>
  <rect x="672" y="263" width="80" height="22" fill="white" stroke="purple" stroke-width="1"/>
  <text x="677" y="279" fill="#ccc" font-size="11">______ "</text>
  <text x="672" y="298" fill="purple" font-size="10">(axle to front)</text>

  <!-- ========== DIMENSION E: GPS antenna offset from axle ========== -->
  <line x1="120" y1="250" x2="120" y2="405" stroke="orange" stroke-width="1.5"/>
  <line x1="113" y1="250" x2="200" y2="250" stroke="orange" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="113" y1="405" x2="127" y2="405" stroke="orange" stroke-width="1"/>
  <text x="80" y="330" fill="orange" font-size="12" font-weight="bold">E</text>
  <rect x="55" y="333" width="80" height="22" fill="white" stroke="orange" stroke-width="1"/>
  <text x="60" y="349" fill="#ccc" font-size="11">______ "</text>
  <text x="55" y="368" fill="orange" font-size="10">(GPS fwd of axle)</text>

  <!-- ========== DIMENSION F: GPS lateral offset ========== -->
  <line x1="400" y1="265" x2="400" y2="290" stroke="#c06" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="410" y="285" fill="#c06" font-size="11" font-weight="bold">F = GPS lateral offset from centerline</text>
  <rect x="410" y="288" width="80" height="22" fill="white" stroke="#c06" stroke-width="1"/>
  <text x="415" y="304" fill="#ccc" font-size="11">______ "</text>
  <text x="410" y="318" fill="#c06" font-size="10">(0 if centered)</text>

  <!-- ========== DIMENSION G: Caster separation ========== -->
  <line x1="280" y1="120" x2="520" y2="120" stroke="#099" stroke-width="1"/>
  <line x1="280" y1="113" x2="280" y2="127" stroke="#099" stroke-width="1"/>
  <line x1="520" y1="113" x2="520" y2="127" stroke="#099" stroke-width="1"/>
  <text x="393" y="116" fill="#099" font-size="12" font-weight="bold">G</text>
  <rect x="630" y="120" width="100" height="22" fill="white" stroke="#099" stroke-width="1"/>
  <text x="635" y="136" fill="#ccc" font-size="11">________ "</text>
  <text x="630" y="116" fill="#099" font-size="10">G = caster separation</text>
</svg>
