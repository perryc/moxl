<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550" font-family="monospace" font-size="13">
  <rect width="800" height="550" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold">MOXL Measurement Sheet 3/4 — Belt Drive / Alternator</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#666">Print at 100%. Sketch belt routing in the box. Measure all pulleys.</text>

  <!-- === LEFT SIDE: Pulley cross-section (side view) === -->
  <text x="200" y="80" text-anchor="middle" font-size="14" font-weight="bold">Blade Pulley — Side View</text>
  <text x="200" y="95" text-anchor="middle" font-size="11" fill="#666">(for alternator coupler design)</text>

  <!-- Deck surface -->
  <rect x="80" y="300" width="240" height="8" fill="#ddd" stroke="black" stroke-width="1"/>
  <text x="320" y="308" font-size="10" fill="#666">deck top</text>

  <!-- Shaft -->
  <rect x="190" y="170" width="20" height="200" fill="#eee" stroke="black" stroke-width="1.5"/>
  <text x="230" y="270" font-size="10">shaft</text>

  <!-- Pulley -->
  <rect x="140" y="330" width="120" height="30" rx="3" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="350" text-anchor="middle" font-size="10">pulley</text>

  <!-- Belt on pulley -->
  <rect x="145" y="335" width="110" height="10" rx="2" fill="#ccc" stroke="black" stroke-width="1"/>

  <!-- ========== DIMENSION A: Shaft diameter ========== -->
  <line x1="160" y1="200" x2="190" y2="200" stroke="red" stroke-width="1"/>
  <line x1="210" y1="200" x2="240" y2="200" stroke="red" stroke-width="1"/>
  <text x="145" y="196" fill="red" font-size="12" font-weight="bold">A</text>
  <rect x="100" y="180" width="60" height="22" fill="white" stroke="red" stroke-width="1"/>
  <text x="105" y="196" fill="#ccc" font-size="11">____ "</text>
  <text x="100" y="216" fill="red" font-size="10">shaft dia</text>

  <!-- ========== DIMENSION B: Shaft protrusion above deck ========== -->
  <line x1="70" y1="170" x2="70" y2="300" stroke="blue" stroke-width="1.5"/>
  <line x1="63" y1="170" x2="77" y2="170" stroke="blue" stroke-width="1"/>
  <line x1="63" y1="300" x2="77" y2="300" stroke="blue" stroke-width="1"/>
  <text x="45" y="240" fill="blue" font-size="12" font-weight="bold">B</text>
  <rect x="20" y="243" width="60" height="22" fill="white" stroke="blue" stroke-width="1"/>
  <text x="25" y="259" fill="#ccc" font-size="11">____ "</text>
  <text x="20" y="278" fill="blue" font-size="10">shaft above</text>
  <text x="20" y="290" fill="blue" font-size="10">deck</text>

  <!-- ========== DIMENSION C: Pulley diameter ========== -->
  <line x1="140" y1="380" x2="260" y2="380" stroke="green" stroke-width="1.5"/>
  <line x1="140" y1="360" x2="140" y2="387" stroke="green" stroke-width="1"/>
  <line x1="260" y1="360" x2="260" y2="387" stroke="green" stroke-width="1"/>
  <text x="193" y="397" fill="green" font-size="12" font-weight="bold">C</text>
  <rect x="170" y="400" width="70" height="22" fill="white" stroke="green" stroke-width="1"/>
  <text x="175" y="416" fill="#ccc" font-size="11">_____ "</text>
  <text x="170" y="435" fill="green" font-size="10">pulley OD</text>

  <!-- ========== DIMENSION D: Shaft end type ========== -->
  <!-- Shaft top detail -->
  <line x1="190" y1="170" x2="210" y2="170" stroke="purple" stroke-width="2"/>
  <text x="220" y="170" fill="purple" font-size="11" font-weight="bold">D = Shaft end:</text>
  <rect x="220" y="175" width="130" height="65" fill="white" stroke="purple" stroke-width="1"/>
  <text x="228" y="192" fill="purple" font-size="11">[ ] Keyed</text>
  <text x="228" y="208" fill="purple" font-size="11">[ ] Threaded</text>
  <text x="228" y="224" fill="purple" font-size="11">[ ] Plain / set screw</text>
  <text x="228" y="238" fill="purple" font-size="11">[ ] Splined</text>

  <!-- === RIGHT SIDE: Belt routing sketch area === -->
  <text x="580" y="80" text-anchor="middle" font-size="14" font-weight="bold">Belt Routing — Top View Sketch</text>
  <text x="580" y="95" text-anchor="middle" font-size="11" fill="#666">(draw pulleys, belt path, idlers)</text>

  <rect x="430" y="110" width="330" height="280" fill="white" stroke="black" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="595" y="255" text-anchor="middle" font-size="40" fill="#eee">SKETCH</text>
  <text x="595" y="280" text-anchor="middle" font-size="12" fill="#ddd">belt routing here</text>

  <!-- Pulley measurement table -->
  <text x="430" y="415" font-size="13" font-weight="bold">Pulley Diameters:</text>

  <text x="430" y="438" font-size="12">Engine output pulley:</text>
  <rect x="610" y="424" width="80" height="22" fill="white" stroke="black" stroke-width="1"/>
  <text x="615" y="440" fill="#ccc" font-size="11">______ "</text>

  <text x="430" y="463" font-size="12">Blade deck input pulley:</text>
  <rect x="610" y="449" width="80" height="22" fill="white" stroke="black" stroke-width="1"/>
  <text x="615" y="465" fill="#ccc" font-size="11">______ "</text>

  <text x="430" y="488" font-size="12">Blade spindle pulley:</text>
  <rect x="610" y="474" width="80" height="22" fill="white" stroke="black" stroke-width="1"/>
  <text x="615" y="490" fill="#ccc" font-size="11">______ "</text>

  <text x="430" y="513" font-size="12">Idler/tensioner pulley:</text>
  <rect x="610" y="499" width="80" height="22" fill="white" stroke="black" stroke-width="1"/>
  <text x="615" y="515" fill="#ccc" font-size="11">______ "</text>

  <text x="430" y="540" font-size="12">Belt # (stamped on belt):</text>
  <rect x="610" y="526" width="150" height="22" fill="white" stroke="black" stroke-width="1"/>
  <text x="615" y="542" fill="#ccc" font-size="11">_____________</text>
</svg>
